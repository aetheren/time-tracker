<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Pikachu cursor -->
  <!-- Left ear -->
  <polygon points="5,2 8,12 2,10" fill="#1a1a1a"/>
  <polygon points="5.5,3 7.5,11 3,9.5" fill="#FFD700"/>
  <!-- Right ear -->
  <polygon points="27,2 30,10 24,12" fill="#1a1a1a"/>
  <polygon points="26.5,3 29,9.5 24.5,11" fill="#FFD700"/>
  <!-- Ear tips -->
  <polygon points="5,2 7,6 3,5" fill="#1a1a1a"/>
  <polygon points="27,2 29,5 25,6" fill="#1a1a1a"/>
  <!-- Head -->
  <ellipse cx="16" cy="18" rx="12" ry="10" fill="#FFD700"/>
  <!-- Face -->
  <!-- Eyes -->
  <circle cx="12" cy="16" r="2" fill="#1a1a1a"/>
  <circle cx="20" cy="16" r="2" fill="#1a1a1a"/>
  <circle cx="12.5" cy="15.5" r="0.7" fill="white"/>
  <circle cx="20.5" cy="15.5" r="0.7" fill="white"/>
  <!-- Cheeks -->
  <ellipse cx="8" cy="20" rx="3" ry="2" fill="#FF6B6B" opacity="0.6"/>
  <ellipse cx="24" cy="20" rx="3" ry="2" fill="#FF6B6B" opacity="0.6"/>
  <!-- Nose -->
  <circle cx="16" cy="18" r="0.8" fill="#1a1a1a"/>
  <!-- Mouth -->
  <path d="M13 20 Q16 23 19 20" fill="none" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
</svg>
